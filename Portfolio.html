function Lightbox({ src, title, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const isVideo = /\.(mp4|webm|ogg)$/i.test(src);

  return (
    <div className="lightbox" onClick={onClose}>
      <div className="lightbox-inner" onClick={(e) => e.stopPropagation()}>
        {isVideo
          ? <video src={src} autoPlay controls loop playsInline></video>
          : <img src={src} alt={title} />
        }
      </div>
    </div>);

}

  const isVideo = project.media && /\.(mp4|webm|ogg)$/i.test(project.media);

  return (
    <div
      className={`project-card ${open ? 'open' : ''}`}
      style={{ '--card-accent': project.accent }}>

      {lightbox && <Lightbox src={project.media} title={project.title} onClose={() => setLightbox(false)} />}

      <div className="project-header" onClick={() => setOpen(!open)}>
        <div>
          <div className="project-meta">
            <span className="project-num">#{String(project.id).padStart(2, '0')}</span>
            <span className="project-engine-tag">{project.engine}</span>
            <span className="project-type-tag">{project.type[lang]}</span>
          </div>
          <div className="project-title-row">
            <span className="project-name">{project.title}</span>
            <span className="project-short">{project.short[lang]}</span>
          </div>
        </div>
        <div className="project-toggle">
          <div className="toggle-icon">+</div>
        </div>
      </div>

      <div className="project-body">
        <div className="project-body-inner">
          <div>
            <p className="project-desc">{project.desc[lang]}</p>
            <div className="project-tech-list">
              {project.tech.map((t, i) =>
              <span className="tag project-tech-tag" key={i}>
                  {t}
                </span>
              )}
            </div>
            <div className="project-links">
              {project.github && <a className="link-btn" href={project.github} target="_blank" rel="noreferrer">⌥ {c.links.github}</a>}
              {project.demo && <a className="link-btn" href={project.demo} target="_blank" rel="noreferrer">▶ {c.links.demo}</a>}
              {project.download && <a className="link-btn" href={project.download}>↓ {c.links.download}</a>}
              {project.links && project.links.map((l, i) =>
                <a className="link-btn" href={l.url} key={i} target="_blank" rel="noreferrer">↗ {l.label}</a>
              )}
            </div>
          </div>
          <div
            className={`project-media ${project.media ? 'project-media--zoomable' : ''}`}
            onClick={project.media ? () => setLightbox(true) : undefined}>
            {project.media
              ? isVideo
                ? <video src={project.media} autoPlay muted loop playsInline></video>
                : <img src={project.media} alt={project.title} />
              : <div className="media-placeholder">
                  <div className="media-placeholder-icon">◻</div>
                  <div className="media-placeholder-text">SCREENSHOT / VIDEO</div>
                </div>
            }
          </div>
        </div>
      </div>
    </div>);

}

function Projects({ c, lang, tweaks }) {
  return (
    <div id="projects">
      <div>
        <div className="section-label">{c.projectsLabel}</div>
        <h2 className="section-title">{c.projectsTitle}</h2>
      </div>
      <div className="projects-list">
        {projects.map((p) =>
        <ProjectCard key={p.id} project={p} lang={lang} c={c} accentColor={tweaks.accentColor} />
        )}
      </div>
    </div>);

}

function Contact({ c }) {
  return (
    <section id="contact">
      <div className="section-label">{c.contactLabel}</div>
      <h2 className="section-title">{c.contactTitle}</h2>
      <div className="contact-grid">
        <div>
          <p className="contact-lead">{c.contactLead}</p>
          <div className="contact-links">
            <a className="contact-link" href="mailto:morgan.fourquet@outlook.fr">
              <div>
                <div className="contact-link-label">Email</div>
                <div className="contact-link-value">morgan.fourquet@outlook.fr</div>
              </div>
              <span className="contact-link-arrow">→</span>
            </a>
            <a className="contact-link" href="https://www.linkedin.com/in/morgan-fourquet-57148b26a/" target="_blank">
              <div>
                <div className="contact-link-label">LinkedIn</div>
                <div className="contact-link-value">linkedin.com/in/morgan</div>
              </div>
              <span className="contact-link-arrow">→</span>
            </a>
            <a className="contact-link" href="https://github.com/Nagro0m" target="_blank">
              <div>
                <div className="contact-link-label">GitHub</div>
                <div className="contact-link-value">github.com/morgan</div>
              </div>
              <span className="contact-link-arrow">→</span>
            </a>
          </div>
        </div>
        <div>
          <div className="cv-box">
            <div className="cv-box-label">{c.cvTitle}</div>
            <div className="cv-box-title">Morgan — Game Developer</div>
            <p className="cv-box-text">{c.cvText}</p>
            <a className="btn-primary" href="#">↓ {c.cvBtn}</a>
          </div>
        </div>

}

// ─── TWEAKS PANEL ────────────────────────────────────────────────────────────

function MyTweaksPanel({ tweaks, setTweak }) {
  return (
    <TweaksPanel>
      <TweakSection label="Visuals">
        <TweakColor label="Accent color" value={tweaks.accentColor} onChange={(v) => setTweak('accentColor', v)} />
      </TweakSection>
      <TweakSection label="Sections">
        <TweakToggle label="Show Skills section" value={tweaks.showSkills} onChange={(v) => setTweak('showSkills', v)} />
        <TweakToggle label="Show Timeline section" value={tweaks.showTimeline} onChange={(v) => setTweak('showTimeline', v)} />
      </TweakSection>
      <TweakSection label="Hero">
        <TweakText label="Subtitle" value={tweaks.heroSubtitle} onChange={(v) => setTweak('heroSubtitle', v)} />
      </TweakSection>
    </TweaksPanel>);

}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [lang, setLang] = useState('fr');
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);
  const c = content[lang];

  const setTweak = (key, val) => setTweaks((prev) => ({ ...prev, [key]: val }));

  // Apply accent color CSS variable
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    document.documentElement.style.setProperty('--accent-dim', tweaks.accentColor + '1f');
    document.documentElement.style.setProperty('--accent-glow', tweaks.accentColor + '59');
  }, [tweaks.accentColor]);

  return (
    <>
      <Nav lang={lang} setLang={setLang} c={c} />
      <Hero c={c} tweaks={tweaks} />
      <About c={c} />
      <Skills c={c} tweaks={tweaks} />
      <Timeline c={c} tweaks={tweaks} />
      <Projects c={c} lang={lang} tweaks={tweaks} />
      <Contact c={c} />
      <footer>
        <span className="footer-text">{c.footerText}</span>
        <span className="footer-text">
          Unreal Engine · Unity · C++ · C# · Python
        </span>
      </footer>
      <MyTweaksPanel tweaks={tweaks} setTweak={setTweak} />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
